# =============================================================================
# xiaozhiMCP Configuration
# =============================================================================
# Quick start: Run 'xiaozhimcp init' for interactive guided setup.
# This file is a reference showing ALL available options.
#
# Minimal config for server role:
#   [xiaozhi]
#   endpoint = "wss://api.xiaozhi.me/mcp/?token=YOUR_TOKEN"
#
# Minimal config for client role:
#   [client]
#   server_url = "ws://your-server-ip:18888/agent"
#   node_id = "my-pc-01"
#   client_token = "YOUR_SHARED_TOKEN"

# ---------------------------------------------------------------------------
# Core: Xiaozhi endpoint connection (REQUIRED for server role)
# ---------------------------------------------------------------------------
[xiaozhi]
# The Xiaozhi MCP WebSocket endpoint with your API token.
# Get your token from xiaozhi.me.
endpoint = "wss://api.xiaozhi.me/mcp/?token=replace_with_your_token"
# Internal: path to the app server script.
server_script = "app_server.py"

# ---------------------------------------------------------------------------
# Cluster: Let client nodes connect to this server (OPTIONAL, server only)
# ---------------------------------------------------------------------------
[cluster]
# Set to true to accept WebSocket connections from client nodes.
enabled = false
# Host and port to listen on for client connections.
listen_host = "0.0.0.0"
listen_port = 18888
# Shared secret token — both server and clients must use the same token.
client_token = "replace_with_shared_client_token"

# ---------------------------------------------------------------------------
# Client: Connect this node to a cluster server (REQUIRED for client role)
# ---------------------------------------------------------------------------
[client]
# WebSocket URL of the server (use ws:// for local, wss:// for remote).
server_url = "ws://your-server-public-ip:18888/agent"
# Unique name for this machine (e.g. "office-pc", "macbook-pro").
node_id = "pc-win-01"
# Must match the cluster.client_token on the server.
client_token = "replace_with_shared_client_token"

# ---------------------------------------------------------------------------
# Catalog: Component repository for remote install
# ---------------------------------------------------------------------------
[catalog]
# Git repository containing installable components.
repo_url = "https://github.com/iiishop/xiaozhiMCP-components.git"
branch = "main"
timeout_seconds = 20

# ---------------------------------------------------------------------------
# Components: Where local components are stored and auto-discovered
# ---------------------------------------------------------------------------
[components]
# Catalog-installed runtime component folder.
# Components installed from xiaozhiMCP-components are placed here and
# auto-discovered on startup.
folder = "components"

# ---------------------------------------------------------------------------
# Core error logging (server role)
# ---------------------------------------------------------------------------
# Built-in tool support: logmcp_get_errors(limit=50)
# Optional. Set db_path to persist error history.
[logmcp]
db_path = ""

# ---------------------------------------------------------------------------
# Catalog component-specific configuration
# ---------------------------------------------------------------------------
# Install components via catalog tools (or `xiaozhimcp init`) before enabling
# their config sections below.

# --- Exa Web Search (server role) ---
# REQUIRED: Sign up at https://dashboard.exa.ai to get an API key.
[exa]
api_key = "replace_with_your_exa_api_key"
base_url = "https://api.exa.ai"

# --- Apple Music (macOS client only) ---
# Requires installing `apple_music_macos` from the catalog first.
[apple_music_macos]
enabled = true
install_dir = "~/.xiaozhi/applemusic-mcp"
update_on_startup = true

# --- Windows-only components (no config needed) ---
# clipboard:  Clipboard read/write with rich text support
# windows_manager: Window management (list, focus, close apps)

# --- Cross-platform components (no config needed) ---
# local_schedule: SQLite-backed calendar/schedule manager
